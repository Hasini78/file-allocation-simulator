<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File Allocation Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>File Allocation Strategy Simulator</h1>

<div class="controls">
    <label>Disk Size:</label>
    <input type="number" id="diskSize" value="20">

    <label>File Name:</label>
    <input type="text" id="fileName">

    <label>File Size:</label>
    <input type="number" id="fileSize">

    <select id="strategy">
        <option value="sequential">Sequential</option>
        <option value="linked">Linked</option>
        <option value="indexed">Indexed</option>
    </select>

    <button onclick="createDisk()">Create Disk</button>
    <button onclick="allocateFile()">Allocate File</button>
</div>

<div id="disk"></div>

<h3>Logs</h3>
<pre id="output"></pre>

<script src="script.js"></script>
</body>
</html>
